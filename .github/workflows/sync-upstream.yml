name: Sync Upstream

on:
  schedule:
    - cron: '0 0 * * *'  # 每天凌晨 12 点自动运行
  workflow_dispatch:  # 也可以手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0  # 完整克隆历史

      - name: Set up Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream repository
        run: git remote add upstream https://github.com/navidrome/navidrome.git

      - name: Fetch upstream changes
        run: git fetch upstream

      - name: Merge upstream changes
        run: |
          # 尝试合并上游更改
          if git merge upstream/master -X theirs -m "Merge upstream/master"; then
            echo "Merge successful"
          else
            echo "Merge had conflicts, attempting to resolve..."
            # 优先保留我们的 netease adapter，其他使用上游版本
            git checkout --ours adapters/netease/
            git add adapters/netease/
            # 对于删除的文件（如 spotify），使用上游的决定
            git status | grep 'deleted by upstream' | awk '{print $4}' | xargs -r git rm
            git status | grep 'deleted by them' | awk '{print $4}' | xargs -r git rm
            # 完成合并
            git merge --continue || echo "Failed to resolve conflicts"
          fi

      - name: Verify netease adapter is intact
        run: |
          if [ ! -f "adapters/netease/agent.go" ]; then
            echo "ERROR: NetEase adapter was lost during merge!"
            exit 1
          fi
          echo "NetEase adapter verified"

      - name: Push changes to your forked repository
        run: |
          git push https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/TooAndy/navidrome.git master

  tag-watcher:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    needs: [sync]
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0  # 完整克隆历史

      - name: Sync upstream tags
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          LAST_UPSTREAM_TAG=$(git ls-remote --tags https://github.com/navidrome/navidrome.git | cut -d$'\t' -f2 | grep -E '^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$' | cut -d'/' -f3 | sort -V | tail -n 1)
          echo "$LAST_UPSTREAM_TAG"
          if [ $(git tag | grep $LAST_UPSTREAM_TAG -c) == "0" ]; then
            echo "Created new tag: $LAST_UPSTREAM_TAG"
            git tag "$LAST_UPSTREAM_TAG"
            git push --tags https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/TooAndy/navidrome.git
          else
            echo "find no new tag, exit"
          fi
